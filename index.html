<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Money Ware | Digital Precision</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-window: #080808;
            --bg-sidebar: #050505;
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.2);
            --border: rgba(255, 255, 255, 0.04);
            --card-bg: #0c0c0c;
            --text-dim: #666;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; user-select: none; outline: none; }
        body { margin: 0; padding: 0; background: transparent; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

        /* --- NOTIFICATIONS --- */
        #notify-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none;
        }
        .notify {
            background: rgba(10, 10, 10, 0.9); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 8px; min-width: 250px;
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
            animation: notifyIn 0.3s ease-out; overflow: hidden; position: relative;
        }
        @keyframes notifyIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .notify-header { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; color: #fff; }
        .notify-header i { color: var(--accent); }
        .notify-msg { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
        .notify-bar { height: 2px; background: var(--accent); position: absolute; bottom: 0; left: 0; width: 100%; }

        /* Spectator List */
        #spectator-list {
            position: absolute; top: 20px; right: 20px; width: 200px; 
            background: rgba(5, 5, 5, 0.8); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px; backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none; transition: 0.3s;
        }
        .spec-item { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 13px; }
        .spec-icon { color: var(--accent); font-size: 10px; }

        #menu-wrapper {
            position: absolute; top: 50px; left: 100px;
            display: flex; align-items: flex-start; gap: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }

        #app, #player-detail-menu { pointer-events: all; }

        #app {
            width: 1050px; height: 820px;
            background: var(--bg-window); border: 1px solid var(--border);
            border-radius: 16px; display: flex; box-shadow: 0 50px 100px rgba(0,0,0,0.8); overflow: hidden;
        }

        #player-detail-menu {
            width: 350px; height: 820px; background: var(--bg-window); border: 1px solid var(--border);
            border-radius: 16px; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            display: none; flex-direction: column; padding: 25px; animation: slideIn 0.3s ease-out; overflow-y: auto;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 15px; cursor: grab; }
        .brand-header { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; pointer-events: none; }
        .dollar-sign { color: var(--accent); font-size: 24px; font-weight: 800; }
        .brand-name { font-weight: 700; color: #fff; font-size: 20px; }
        .brand-name span { color: var(--accent); }

        .nav-link { padding: 12px 15px; margin-bottom: 4px; border-radius: 10px; color: var(--text-dim); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.06); }
        .nav-link.active i { color: var(--accent); }

        .content { flex: 1; padding: 35px; overflow-y: auto; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 15px; }
        .card h3 { margin: 0 0 15px 0; font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }

        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; position: relative; }
        .row label { font-size: 13px; color: #eee; }

        .switch { width: 34px; height: 18px; background: #222; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch::after { content: ''; position: absolute; width: 12px; height: 12px; background: #888; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .switch.on { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .switch.on::after { left: 19px; background: #000; }

        .keybind-tag { font-size: 9px; color: var(--accent); background: rgba(0,255,136,0.1); padding: 2px 4px; border-radius: 4px; margin-left: 8px; border: 1px solid rgba(0,255,136,0.2); display: none; }

        .feature-btn { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; transition: 0.2s; text-align: left; }
        .feature-btn:hover { border-color: var(--accent); }
        .btn-danger:hover { background: var(--danger); color: #fff; }

        .input-box { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: #fff; width: 100%; margin-bottom: 10px; font-size: 12px; }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .config-item { background: #080808; border: 1px solid var(--border); padding: 12px; border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; margin-bottom: 5px; }
        .config-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); width: 0%; transition: width 0.1s linear; }

        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-val { min-width: 35px; font-size: 12px; color: var(--accent); text-align: right; }
        input[type="range"] { -webkit-appearance: none; width: 80px; height: 4px; background: #333; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .filter-btn { flex: 1; padding: 8px; background: #0a0a0a; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .filter-btn.active { border-color: var(--accent); color: #fff; background: rgba(0,255,136,0.05); }
        
        .player-item { background: #0a0a0a; border: 1px solid var(--border); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; cursor: pointer; transition: 0.2s; }
        .player-item:hover { border-color: var(--accent); background: #0e0e0e; }
        .player-info { display: flex; align-items: center; gap: 12px; }
        .player-avatar { width: 34px; height: 34px; background: #151515; border-radius: 8px; display: grid; place-items: center; font-weight: 700; color: var(--accent); font-size: 14px; border: 1px solid var(--border); }
        .player-meta { display: flex; flex-direction: column; gap: 2px; }
        .player-name { font-size: 13px; font-weight: 600; color: #fff; }
        .player-sub { font-size: 10px; color: var(--text-dim); }
    </style>
</head>
<body>

<div id="notify-container"></div>

<div id="spectator-list">
    <div style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; font-weight: 700;">Spectators</div>
    <div id="spec-items-wrapper">
        <div class="spec-item"><i class="fa-solid fa-circle spec-icon"></i> Laxus_Gamer</div>
    </div>
</div>

<div id="menu-wrapper">
    <div id="app">
        <div class="sidebar">
            <div class="brand-header">
                <div class="dollar-sign">$</div>
                <div class="brand-name">MONEY<span>WARE</span></div>
            </div>
            <div class="nav-links">
                <div class="nav-link active" onclick="tab('combat', this, 'Combat', 'Aimbot & Weapons')"><i class="fa-solid fa-crosshairs"></i> Combat</div>
                <div class="nav-link" onclick="tab('misc', this, 'Misc & Player', 'Personal Features')"><i class="fa-solid fa-user"></i> Misc & Player</div>
                <div class="nav-link" onclick="tab('vehicle', this, 'Vehicle', 'Handling & Spawning')"><i class="fa-solid fa-car"></i> Vehicle</div>
                <div class="nav-link" onclick="tab('visuals', this, 'Visuals', 'ESP & UI')"><i class="fa-solid fa-eye"></i> Visuals</div>
                <div class="nav-link" onclick="tab('players', this, 'Online Players', 'Interaction')"><i class="fa-solid fa-users"></i> Players</div>
                <div class="nav-link" onclick="tab('settings', this, 'Settings', 'Config & System')"><i class="fa-solid fa-gear"></i> Settings</div>
            </div>
        </div>

        <div class="content">
            <h2 id="page-h2" style="color:#fff; margin:0;">Combat</h2>
            <p id="page-desc" style="color:var(--text-dim); font-size:13px; margin-bottom:25px;">Aimbot & Weapons</p>

            <div id="combat" class="tab-pane active">
                <div class="grid">
                    <div class="card">
                        <h3>Aimbot Options</h3>
                        <div class="row" oncontextmenu="setupKeybind(this)"><label>Enable Aimbot <span class="keybind-tag"></span></label><div class="switch" data-feat="aimbot"></div></div>
                        <div class="row" oncontextmenu="setupKeybind(this)"><label>Silent Aim <span class="keybind-tag"></span></label><div class="switch" data-feat="silent_aim"></div></div>
                        <div class="row"><label>Target Players</label><div class="switch on" data-feat="aim_players"></div></div>
                        <div class="row"><label>Aimbot FOV</label>
                            <div class="slider-container">
                                <input type="range" min="1" max="180" value="90" oninput="updateVal(this, 'fov_val')" data-feat="aim_fov">
                                <span class="slider-val" id="fov_val">90</span>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Weapon Mods</h3>
                        <div class="row"><label>Infinite Ammo</label><div class="switch" data-feat="inf_ammo"></div></div>
                        <div class="row"><label>No Reload</label><div class="switch" data-feat="no_reload"></div></div>
                        <div class="row"><label>Rapid Fire</label><div class="switch" data-feat="rapid_fire"></div></div>
                    </div>
                </div>
            </div>

            <div id="misc" class="tab-pane">
                <div class="grid">
                    <div class="card">
                        <h3>Player State</h3>
                        <div class="row"><label>God Mode</label><div class="switch" data-feat="godmode"></div></div>
                        <div class="row"><label>Noclip</label><div class="switch" data-feat="noclip"></div></div>
                        <div class="row"><label>Super Jump</label><div class="switch" data-feat="superjump"></div></div>
                    </div>
                    <div class="card">
                        <h3>Actions</h3>
                        <button class="feature-btn" data-action="heal">Heal Player</button>
                        <button class="feature-btn" data-action="max_armor">Max Armor</button>
                        <button class="feature-btn btn-danger" data-action="suicide">Suicide</button>
                    </div>
                </div>
            </div>

            <div id="vehicle" class="tab-pane">
                <div class="grid">
                    <div class="card">
                        <h3>Spawn</h3>
                        <input type="text" class="input-box" id="veh-input" placeholder="Vehicle Name...">
                        <button class="feature-btn" onclick="spawnVehicle()">Spawn Vehicle</button>
                    </div>
                    <div class="card">
                        <h3>Mods</h3>
                        <button class="feature-btn" data-action="veh_repair">Repair</button>
                        <div class="row"><label>Rainbow</label><div class="switch" data-feat="veh_rainbow"></div></div>
                    </div>
                </div>
            </div>

            <div id="players" class="tab-pane">
                <input type="text" class="input-box" id="player-search" placeholder="Search Player..." oninput="filterOnlinePlayers()">
                <div id="online-player-list">
                    <div class="player-item" onclick="openPlayerMenu('Laxus_Gamer', '12')">
                        <div class="player-info">
                            <div class="player-avatar">L</div>
                            <div class="player-meta"><span class="player-name">Laxus_Gamer</span><span class="player-sub">ID: 12</span></div>
                        </div>
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
            </div>

            <div id="settings" class="tab-pane">
                <div class="grid">
                    <div class="card">
                        <h3>Config</h3>
                        <input type="text" class="input-box" id="newCfgName" placeholder="Name...">
                        <button class="feature-btn" onclick="saveConfig()">Save</button>
                        <div class="config-item" onmousedown="startCfg(this)" onmouseup="stopCfg(this)">
                            <span>Default.json</span>
                            <div class="config-progress"></div>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Menu</h3>
                        <button class="feature-btn btn-danger" onclick="killMenu()">Unload Menu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="player-detail-menu">
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="target-avatar" style="width: 50px; height: 50px; background:#1a1a1a; border-radius:12px; margin: 0 auto 10px; display:grid; place-items:center; color:var(--accent); font-size:20px; font-weight:700;">?</div>
            <h3 id="target-name" style="margin:0; color:#fff;">Player</h3>
            <span id="target-id-label" style="color:var(--accent); font-size:12px;">ID: --</span>
        </div>
        <button class="feature-btn" data-action="p_spectate">Spectate</button>
        <button class="feature-btn btn-danger" data-action="p_kill">Kill</button>
        <button class="feature-btn" data-action="p_teleport">Teleport To</button>
        <div style="margin-top:auto;"><button class="feature-btn" onclick="closeMenu()">Close</button></div>
    </div>
</div>

<script>
    let activeBinding = null;
    let cfgTimer = null;

    // --- LUA COMMUNICATION ---
    function sendToLua(type, data = {}) {
        // Funktioniert in FiveM automatisch mit dem richtigen Resource-Namen
        fetch(`https://${GetParentResourceName()}/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(e => {});
    }

    // --- NOTIFICATIONS ---
    function notify(title, msg) {
        const container = document.getElementById('notify-container');
        const n = document.createElement('div');
        n.className = 'notify';
        n.innerHTML = `<div class="notify-header"><i class="fa-solid fa-bell"></i> ${title}</div><div class="notify-msg">${msg}</div><div class="notify-bar"></div>`;
        container.appendChild(n);
        const bar = n.querySelector('.notify-bar');
        setTimeout(() => bar.style.width = '0%', 10);
        bar.style.transition = 'width 3s linear';
        setTimeout(() => { n.style.animation = 'notifyIn 0.3s reverse forwards'; setTimeout(() => n.remove(), 300); }, 3000);
    }

    // --- UI CONTROLS ---
    function tab(id, el, title, desc) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        document.getElementById('page-h2').innerText = title;
        document.getElementById('page-desc').innerText = desc;
    }

    // --- TOGGLES & BUTTONS ---
    document.addEventListener('click', (e) => {
        // Toggle Switch
        if(e.target.classList.contains('switch')) {
            e.target.classList.toggle('on');
            const state = e.target.classList.contains('on');
            const feat = e.target.getAttribute('data-feat');
            sendToLua('toggleFeature', { feature: feat, state: state });
        }
        
        // Feature Button
        const btn = e.target.closest('.feature-btn');
        if(btn && btn.hasAttribute('data-action')) {
            sendToLua('executeAction', { action: btn.getAttribute('data-action') });
            notify('Action', 'Executing: ' + btn.innerText);
        }
    });

    // --- SLIDER ---
    function updateVal(s, t) {
        document.getElementById(t).innerText = s.value;
        sendToLua('sliderChange', { feature: s.getAttribute('data-feat'), value: s.value });
    }

    // --- PLAYER MENU ---
    function openPlayerMenu(name, id) {
        document.getElementById('target-name').innerText = name;
        document.getElementById('target-id-label').innerText = "ID: " + id;
        document.getElementById('player-detail-menu').style.display = 'flex';
        sendToLua('selectPlayer', { name: name, id: id });
    }
    function closeMenu() { document.getElementById('player-detail-menu').style.display = 'none'; }

    // --- KEYBINDS ---
    function setupKeybind(el) {
        event.preventDefault();
        const tag = el.querySelector('.keybind-tag');
        tag.innerText = "Binding...";
        tag.style.display = "inline-block";
        activeBinding = { tag: tag, feat: el.querySelector('.switch').getAttribute('data-feat') };
    }

    window.addEventListener('keydown', (e) => {
        if(activeBinding) {
            const key = e.key.toUpperCase();
            activeBinding.tag.innerText = key;
            sendToLua('setKeybind', { feature: activeBinding.feat, key: key });
            activeBinding = null;
        }
    });

    // --- CONFIG LOAD (Hold 2 Sec) ---
    function startCfg(el) {
        const prog = el.querySelector('.config-progress');
        let start = Date.now();
        cfgTimer = setInterval(() => {
            let diff = Date.now() - start;
            prog.style.width = (diff / 2000 * 100) + '%';
            if(diff >= 2000) {
                clearInterval(cfgTimer);
                sendToLua('loadConfig', { name: el.querySelector('span').innerText });
                notify('Config', 'Settings Loaded');
                prog.style.width = '0%';
            }
        }, 50);
    }
    function stopCfg(el) { clearInterval(cfgTimer); el.querySelector('.config-progress').style.width = '0%'; }

    // --- VISIBILITY (VON LUA GESTEUERT) ---
    window.addEventListener('message', (event) => {
        if (event.data.type === "ui") {
            document.getElementById('menu-wrapper').style.opacity = event.data.status ? "1" : "0";
            document.getElementById('menu-wrapper').style.pointerEvents = event.data.status ? "all" : "none";
        }
    });

    function killMenu() { sendToLua('closeMenu'); }
    function spawnVehicle() { sendToLua('spawnVehicle', { model: document.getElementById('veh-input').value }); }

    // DRAG
    const wrapper = document.getElementById('menu-wrapper');
    const sidebar = document.querySelector('.sidebar');
    let dragging = false, offset = {x:0, y:0};
    sidebar.onmousedown = (e) => { dragging = true; offset.x = e.clientX - wrapper.offsetLeft; offset.y = e.clientY - wrapper.offsetTop; };
    window.onmousemove = (e) => { if(dragging) { wrapper.style.left = (e.clientX-offset.x)+"px"; wrapper.style.top = (e.clientY-offset.y)+"px"; } };
    window.onmouseup = () => dragging = false;
</script>
</body>
</html>
