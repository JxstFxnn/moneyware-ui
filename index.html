<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Money Ware | Digital Precision</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-window: #080808;
            --bg-sidebar: #050505;
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.2);
            --border: rgba(255, 255, 255, 0.04);
            --card-bg: #0c0c0c;
            --text-dim: #666;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; user-select: none; outline: none; }
        
        body { 
            margin: 0; padding: 0; 
            background: transparent !important; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; width: 100vw;
            overflow: hidden; 
            pointer-events: none; /* Klicks gehen durch den leeren Raum */
        }

        /* Notifications */
        #notify-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none;
        }
        .notify {
            background: rgba(10, 10, 10, 0.9); border: 1px solid var(--border);
            padding: 12px 20px; border-radius: 8px; min-width: 250px;
            backdrop-filter: blur(10px); animation: notifyIn 0.3s ease-out;
        }

        /* Spectator List */
        #spectator-list {
            position: absolute; top: 20px; right: 20px; width: 200px; 
            background: rgba(5, 5, 5, 0.5); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; pointer-events: none; z-index: 1;
        }

        /* Menu Wrapper */
        #menu-wrapper {
            position: absolute; top: 100px; left: 100px;
            display: flex; align-items: flex-start; gap: 20px;
            opacity: 1; transition: opacity 0.2s ease;
            pointer-events: all; /* Klicks nur hier erlauben */
            z-index: 1000;
        }

        #app {
            width: 1050px; height: 820px;
            background: var(--bg-window); border: 1px solid var(--border);
            border-radius: 16px; display: flex; overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 30px 15px; cursor: grab; }
        .nav-link { padding: 12px 15px; margin-bottom: 4px; border-radius: 10px; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .nav-link.active { color: #fff; background: rgba(255,255,255,0.06); }
        .nav-link.active i { color: var(--accent); }

        .content { flex: 1; padding: 35px; overflow-y: auto; background: var(--bg-window); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 15px; }
        .card h3 { margin: 0 0 15px 0; font-size: 11px; text-transform: uppercase; color: var(--accent); }

        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .switch { width: 34px; height: 18px; background: #222; border-radius: 20px; position: relative; cursor: pointer; }
        .switch.on { background: var(--accent); }
        .switch::after { content: ''; position: absolute; width: 12px; height: 12px; background: #888; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .switch.on::after { left: 19px; background: #000; }

        .feature-btn { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>

<div id="notify-container"></div>

<div id="spectator-list">
    <div style="font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px;">Spectators</div>
    <div class="spec-item" style="color:#fff; font-size:13px;"><i class="fa-solid fa-circle" style="color:var(--accent); font-size:8px;"></i> Laxus_Gamer</div>
</div>

<div id="menu-wrapper">
    <div id="app">
        <div class="sidebar">
            <div style="color:#fff; font-weight:700; font-size:20px; margin-bottom:40px;">MONEY<span style="color:var(--accent)">WARE</span></div>
            <div class="nav-link active" onclick="tab('combat')"><i class="fa-solid fa-crosshairs"></i> Combat</div>
            <div class="nav-link" onclick="tab('misc')"><i class="fa-solid fa-user"></i> Player</div>
        </div>
        <div class="content">
            <div id="combat" class="tab-pane active">
                <div class="grid">
                    <div class="card">
                        <h3>Aimbot</h3>
                        <div class="row"><label>Enable Aimbot</label><div class="switch" onclick="this.classList.toggle('on')"></div></div>
                    </div>
                </div>
            </div>
            <div id="misc" class="tab-pane">
                <div class="card">
                    <h3>Self</h3>
                    <button class="feature-btn">Heal Player</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function tab(id) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    window.addEventListener('message', (event) => {
        if (event.data.type === "ui") {
            const wrapper = document.getElementById('menu-wrapper');
            if (event.data.status) {
                wrapper.style.display = "flex";
                setTimeout(() => wrapper.style.opacity = "1", 10);
            } else {
                wrapper.style.opacity = "0";
                setTimeout(() => wrapper.style.display = "none", 200);
            }
        }
    });

    // Dragging
    const wrapper = document.getElementById('menu-wrapper');
    const sidebar = document.querySelector('.sidebar');
    let drag = false, ox, oy;
    sidebar.onmousedown = (e) => { drag = true; ox = e.clientX - wrapper.offsetLeft; oy = e.clientY - wrapper.offsetTop; };
    window.onmousemove = (e) => { if(drag) { wrapper.style.left = (e.clientX-ox)+"px"; wrapper.style.top = (e.clientY-oy)+"px"; } };
    window.onmouseup = () => drag = false;
</script>
</body>

</html>
